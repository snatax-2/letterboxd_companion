name: CI

# Tourne à chaque push et à chaque pull request, sur toutes les branches.
# But : détecter une erreur (JSON invalide, syntaxe JS cassée, app.js désynchronisé
# de src/...) AVANT que Vercel ne tente de déployer, plutôt que de le découvrir
# après coup sur le site en ligne.
on:
  push:
  pull_request:

jobs:
  verify:
    name: Vérifications avant déploiement
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validation des fichiers JSON (package.json, manifest.json, vercel.json)
        run: |
          for f in package.json manifest.json vercel.json; do
            echo "→ $f"
            node -e "JSON.parse(require('fs').readFileSync('$f', 'utf8'))"
          done

      - name: Régénération de app.js depuis src/
        run: node scripts/build-app-js.js

      - name: Vérifie que app.js est bien synchronisé avec src/
        run: |
          if ! git diff --exit-code app.js; then
            echo ""
            echo "❌ app.js ne correspond pas au contenu de src/."
            echo "   Un fichier a été modifié dans src/ sans relancer 'npm run build:js' avant de commit."
            echo "   Lance 'npm run build:js' en local, puis commit le app.js régénéré."
            exit 1
          fi
          echo "✓ app.js est à jour par rapport à src/"

      - name: Vérification de la syntaxe de tous les fichiers JavaScript
        run: |
          status=0
          for f in $(find . -name "*.js" -not -path "./node_modules/*" -not -path "./.git/*"); do
            if ! node --check "$f"; then
              echo "❌ Erreur de syntaxe : $f"
              status=1
            fi
          done
          exit $status

      - name: Génération du hash de cache du service worker (sw.js)
        run: node scripts/generate-sw-cache.js

      - name: Résumé
        if: success()
        run: echo "✅ Toutes les vérifications sont passées, Vercel peut déployer."
